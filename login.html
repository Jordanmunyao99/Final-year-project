<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Farm Finance Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">

    <!-- Animated background orbs -->
    <div class="lp-bg" aria-hidden="true">
      <div class="lp-orb lp-orb--1"></div>
      <div class="lp-orb lp-orb--2"></div>
      <div class="lp-orb lp-orb--3"></div>
    </div>

    <div class="lp-wrap">

      <!-- Centered form card -->
      <main class="lp-form-panel">
        <div class="lp-form-wrap">

          <!-- Brand logo at top -->
          <div class="lp-brand-logo">
            <span class="lp-brand-logo__name">Farm Finance</span>
          </div>

          <div class="lp-form-header">
            <h1 class="lp-form-title">Welcome back</h1>
            <p class="lp-form-sub">Sign in to your account to continue</p>
          </div>

          <form id="loginForm" class="lp-form" autocomplete="off" novalidate>

            <div class="lp-field">
              <label class="lp-field__label" for="loginUsername">Username</label>
              <div class="lp-field__wrap">
                <span class="lp-field__icon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </span>
                <input
                  id="loginUsername"
                  class="lp-field__input"
                  type="text"
                  placeholder="Enter your username"
                  autocomplete="username"
                  spellcheck="false"
                />
              </div>
            </div>

            <div class="lp-field">
              <label class="lp-field__label" for="loginPassword">Password</label>
              <div class="lp-field__wrap">
                <span class="lp-field__icon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input
                  id="loginPassword"
                  class="lp-field__input"
                  type="password"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                />
                <button
                  class="lp-pw-toggle"
                  type="button"
                  id="loginPwToggle"
                  aria-label="Toggle password visibility"
                >
                  <svg id="iconEye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg id="iconEyeOff" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>

            <p class="lp-error" id="loginError" role="alert" aria-live="polite"></p>

            <button class="lp-submit" type="submit" id="loginSubmitBtn">
              <span id="loginBtnText">Sign In</span>
              <span class="lp-submit__arrow" aria-hidden="true">→</span>
            </button>

          </form>

        </div>
      </main>
    </div>

    <script src="login.js"></script>
  </body>
</html>
